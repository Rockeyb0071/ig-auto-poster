name: Refresh Instagram Token (optional)

# OPTIONAL — only works if you've created the ADMIN_PAT secret described
# in SETUP.md ("Step 6: true zero-maintenance token refresh"). If you'd
# rather refresh manually every ~2 months, you can disable this workflow
# from the Actions tab and skip that step.

on:
  schedule:
    - cron: "0 3 * * 0"   # every Sunday at 3 AM UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_APP_ID: ${{ secrets.IG_APP_ID }}
      IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Refresh token
        id: refresh
        run: |
          NEW_TOKEN=$(python3 scripts/refresh_token.py)
          echo "::add-mask::$NEW_TOKEN"
          echo "NEW_TOKEN=$NEW_TOKEN" >> "$GITHUB_ENV"

      - name: Update IG_ACCESS_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: gh secret set IG_ACCESS_TOKEN --body "$NEW_TOKEN" --repo ${{ github.repository }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ Instagram token auto-refresh FAIL ho gaya. Manually refresh karna padega (SETUP.md dekho) warna daily posting ruk jayegi."
